<meta property="og:title" content="{{ .Title }}" />
<meta property="og:description" content="{{ if .Summary }}{{ .Summary | plainify | htmlUnescape | truncate 200 }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
{{- with .Params.images -}}
  {{- range first 1 . -}}
    <meta property="og:image" content="{{ . | absURL }}" />
  {{- end -}}
{{- else -}}
  {{- with .Site.Params.images -}}
    {{- range first 1 . -}}
      <meta property="og:image" content="{{ . | absURL }}" />
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if .IsPage }}
  {{- $iso8601 := "2006-01-02T15:04:05-07:00" -}}
  <meta property="article:published_time" content="{{ .Date.Format $iso8601 }}" />
  {{- with .Lastmod }}
    <meta property="article:modified_time" content="{{ .Format $iso8601 }}" />
  {{- end }}
{{- end -}}
